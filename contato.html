    width: 100%;

    .header-overlay .text-center h1, 
    .header-overlay .text-center p {
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
    }
</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Mundo do Café</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-bg-cafe">
    <div class="header-overlay">
      <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
          <a class="navbar-brand" href="index.html">Mundo do Café</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCafe" aria-controls="navbarCafe" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarCafe">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Início</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="historia.html">História</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="tipos.html">Tipos de Café</a>

                <a class="nav-link" href="curiosidades.html">Secretaria do Café</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="contato.html">Contato</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <header class="text-white text-center py-4">
        <h1 class="display-5">Contato</h1>
        <p>Entre em contato conosco para dúvidas, sugestões ou parcerias</p>
      </header>
    </div>
  </div>
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <form>
          <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="seu@email.com" required>
          </div>
          <div class="mb-3">
            <label for="mensagem" class="form-label">Mensagem</label>
            <textarea class="form-control" id="mensagem" rows="5" placeholder="Digite sua mensagem" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
      </div>
      <div class="col-md-5 text-center mt-4 mt-md-0">
        <img src="contato-cafe.jpg" alt="Contato Mundo do Café" class="img-fluid rounded" style="max-width: 320px;">
        <p class="mt-3">Ou envie um e-mail para:<br><strong>ceco1995@gmail.com</strong></p>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3">
